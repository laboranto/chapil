workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      node: 20
    scripts:
      - name: Install root dependencies
        script: npm install
      - name: Install frontend dependencies
        script: npm install --prefix frontend
      - name: Build frontend
        script: npm run build --prefix frontend
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Build iOS
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive
    artifacts:
      - build/App.xcarchive
