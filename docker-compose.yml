version: "3.8"

services:
  chapil:
    build: .
    container_name: chapil
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/carlog.db
      - BACKUP_DIR=/data/backups
      - DATA_DIR=/data
    volumes:
      - ./data:/data

  chapil-demo:
    build: .
    container_name: chapil-demo
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - DB_PATH=/data/carlog.db
      - BACKUP_DIR=/data/backups
      - DATA_DIR=/data
      - DEMO_MODE=true
    volumes:
      - ./data-demo:/data
