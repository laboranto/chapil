{% extends "base.html" %}
{% set active = "other" %}
{% block body %}
<!-- 기타 기록 양식 -->
<form method="post">
<!-- 상단 버튼 -->
<div class="topbar">
    <a href="/other">
          <button class="btn-cancel">취소</button>
    </a>
          <button type="submit" class="btn-submit">저장</button>
</div>
<div class="topbg"></div>
<!-- 양식 본문 -->
<div class="content">
    <div class="form-group">
      <label>날짜</label>
      <input type="date" name="date" required value="{{ record.date if record else '' }}">
    </div>
    <div class="form-group">
      <label>항목</label>
      <div class="select-wrap">
        <select name="item">
          {% for i in items %}
          <option value="{{ i }}" {% if record and record.item == i %}selected{% endif %}>{{ i }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>금액 (원)</label>
      <input type="number" name="amount" inputmode="numeric" value="{{ record.amount if record else '' }}">
    </div>
    <div class="form-group">
      <label>누적 주행거리 (km, 선택)</label>
      <input type="number" name="odometer" inputmode="numeric" value="{{ record.odometer if record else last_odometer }}">
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea name="memo">{{ record.memo if record else '' }}</textarea>
    </div>
</div>
</form>
{% endblock %}
