{% extends "base.html" %}
{% set active = "fuel" %}
{% block body %}
<!-- 확인 버튼 -->
<div class="topbar">
    <a href="/fuel">
          <button class="btn-cancel">취소</button>
    </a>
          <button type="submit" class="btn-submit">저장</button>
</div>
<div class="topbg"></div>
<!-- 주유 기록 양식 -->
<div class="content">
  <form method="post">
    <div class="form-group">
      <label>날짜</label>
      <input type="date" name="date" required value="{{ record.date if record else '' }}">
    </div>
    <div class="form-group">
      <label>구분</label>
      <div class="select-wrap">
        <select name="type">
          {% for t in ['가득주유', '부분주유'] %}
          <option value="{{ t }}" {% if record and record.type == t %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>금액 (원)</label>
      <input type="number" name="amount" inputmode="numeric" required value="{{ record.amount if record else '' }}">
    </div>
    <div class="form-group">
      <label>단가 (원/L)</label>
      <input type="number" name="unit_price" inputmode="numeric" value="{{ record.unit_price if record else '' }}">
    </div>
    <div class="form-group">
      <label>주유량 (L)</label>
      <input type="number" name="liters" step="0.001" inputmode="decimal" value="{{ record.liters if record else '' }}">
    </div>
    <div class="form-group">
      <label>누적 주행거리 (km)</label>
      <input type="number" name="odometer" inputmode="numeric" required value="{{ record.odometer if record else last_odometer }}">
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea name="memo">{{ record.memo or '' }}</textarea>
        </form>
    </div>
</div>

<!-- 자동완성 기능 -->
<script>
// 날짜 자동 입력
const dateInput = document.querySelector('[name="date"]');
if (!dateInput.value) {
  dateInput.value = new Date().toISOString().split('T')[0];
}

// 입력값 선언
const amount = document.querySelector('[name="amount"]');
const unit_price = document.querySelector('[name="unit_price"]');
const liters = document.querySelector('[name="liters"]');

// 입력된 부동소수값 전달
  function calc(changed) {
    const val_amount = parseFloat(amount.value) ;
    const val_unit_price = parseFloat(unit_price.value) ;
    const val_liters = parseFloat(liters.value) ;

    // 기존 값이 변경(changed)되면 다시 계산
    if (changed === 'amount' || changed === 'unit_price'){
      if (val_amount && val_unit_price) liters.value = (val_amount / val_unit_price).toFixed(2) ;
    } else if (changed === 'liters') {
      if (val_amount && val_liters) unit_price.value = Math.round(val_amount / val_liters);
      else if (val_unit_price && val_liters) amount.value = Math.round(val_unit_price * val_liters);
    }
  }

// 사용자의 변경을 감지
  amount.addEventListener('change', () => calc('amount'));
  unit_price.addEventListener('change', () => calc('unit_price'));
  liters.addEventListener('change', () => calc('liters'));
</script>
{% endblock %}
