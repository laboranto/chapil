<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>차계부</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --primary: #0071e3;
      --primary-dark: #0058b0;
      --danger: #ff3b30;
      --text: #1d1d1f;
      --text-sub: #6e6e73;
      --border: #e0e0e5;
      --radius: 12px;
      --nav-h: 56px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: calc(var(--nav-h) + 16px); }
    a { color: inherit; text-decoration: none; }

    /* 상단 헤더 */
    .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar h1 { font-size: 17px; font-weight: 600; }
    .topbar .btn-add { background: var(--primary); color: #fff; border: none; border-radius: 20px; padding: 6px 14px; font-size: 14px; font-weight: 500; cursor: pointer; }

    /* 컨텐츠 */
    .content { padding: 16px; max-width: 600px; margin: 0 auto; }

    /* 카드 */
    .card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
    .card-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .card-sub { font-size: 13px; color: var(--text-sub); }
    .card-amount { font-size: 16px; font-weight: 600; }
    .card-meta { font-size: 12px; color: var(--text-sub); margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
    .badge { background: #e8f0fe; color: #1a73e8; border-radius: 6px; padding: 2px 7px; font-size: 12px; font-weight: 500; }
    .badge.green { background: #e6f4ea; color: #188038; }
    .badge.orange { background: #fef3e2; color: #b06000; }

    /* 액션 버튼 */
    .card-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-sm { border: none; border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; font-weight: 500; }
    .btn-edit { background: var(--bg); color: var(--text); }
    .btn-del { background: #fff0ef; color: var(--danger); }

    /* 폼 */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-sub); margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 11px 13px; border: 1px solid var(--border); border-radius: 10px;
      font-size: 16px; background: var(--card); color: var(--text); outline: none;
      -webkit-appearance: none; appearance: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .btn-submit { width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 6px; }
    .btn-submit:active { background: var(--primary-dark); }
    .btn-cancel { display: block; text-align: center; margin-top: 12px; color: var(--text-sub); font-size: 14px; padding: 8px; }

    /* 요약 그리드 */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .summary-card { background: var(--card); border-radius: var(--radius); padding: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
    .summary-card .label { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
    .summary-card .value { font-size: 20px; font-weight: 700; }
    .summary-card .unit { font-size: 13px; color: var(--text-sub); font-weight: 400; }

    /* 하단 탭 네비게이션 */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 200; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--text-sub); font-size: 10px; font-weight: 500; }
    .nav-item.active { color: var(--primary); }
    .nav-item svg { width: 22px; height: 22px; }

    /* 섹션 헤더 */
    .section-header { font-size: 13px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: .5px; margin: 16px 0 8px; }

    .empty { text-align: center; color: var(--text-sub); padding: 40px 0; font-size: 15px; }

    /* select 화살표 */
    .select-wrap { position: relative; }
    .select-wrap::after { content: '▾'; position: absolute; right: 13px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-sub); }
  </style>
</head>
<body>
  {% block body %}{% endblock %}

  <nav class="bottom-nav">
    <a href="/" class="nav-item {% if active=='home' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      홈
    </a>
    <a href="/fuel" class="nav-item {% if active=='fuel' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 22V8l9-6 9 6v14"/><path d="M16.5 22V12h-9v10"/><line x1="12" y1="12" x2="12" y2="22"/></svg>
      주유
    </a>
    <a href="/maintenance" class="nav-item {% if active=='maint' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      정비
    </a>
    <a href="/other" class="nav-item {% if active=='other' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      기타
    </a>
  </nav>
</body>
</html>
